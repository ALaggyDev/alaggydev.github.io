<div class="site-header">
  <div class="wrapper">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}<b class="command_prompt"></b><b class="blinking_cursor">_</b></a>
    <span class="social_links">
      <a class="color-green-hover" href="{{ '/about/' | relative_url }}">about</a>
      <a class="color-blue-hover" href="{{ '/projects/' | relative_url }}">projects</a>
      {% for link in site.dash.social_links %}
        {% if link.fa == true %}
          <a class="color-{{ link.color }}-hover" href="{{ link.url }}"><i class="fa fa-{{ link.icon }}"></i></a>
        {% else %}
          <a class="color-{{ link.color }}-hover" href="{{ link.url }}"><i class="fab fa-{{ link.icon }}"></i></a>
        {% endif %}
      {% endfor %}
    </span>
  </div>
</div>

<script>
  (function () {
    "use strict";

    if (!("serviceWorker" in navigator)) {
      return;
    }

    var cleanupVersion = "laggy-blog-chirpy-cleanup-2026-05-05";
    var storageKey = "laggyBlogServiceWorkerCleanup";
    var swUrl = "{{ '/sw.min.js' | relative_url }}";

    try {
      if (window.localStorage.getItem(storageKey) === cleanupVersion) {
        return;
      }
    } catch (error) {
      // Continue without localStorage; the worker unregisters itself after cleanup.
    }

    navigator.serviceWorker.addEventListener("message", function (event) {
      if (!event.data || event.data.type !== "SW_CLEANUP_DONE") {
        return;
      }

      try {
        window.localStorage.setItem(storageKey, event.data.version || cleanupVersion);
      } catch (error) {
        // Ignore private-mode or storage-policy failures.
      }

      window.location.reload();
    });

    window.addEventListener("load", function () {
      navigator.serviceWorker
        .register(swUrl, { updateViaCache: "none" })
        .then(function (registration) {
          try {
            window.localStorage.setItem(storageKey, cleanupVersion);
          } catch (error) {
            // Ignore private-mode or storage-policy failures.
          }

          return registration.update();
        })
        .catch(function (error) {
          console.warn("Service worker cleanup failed:", error);
        });
    });
  })();
</script>
